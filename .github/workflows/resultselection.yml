name: Election Data Sync

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allows you to run this manually for testing

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Requests
        run: pip install requests

      - name: Run Update Script
        # We use your specific filename here
        run: python electionresult.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "ElectionBot"
          git config --global user.email "actions@github.com"
          
          # Use "git add ." to find any new or updated JSON files automatically
          git add .
          
          # Only commit if there are actual changes to save
          if git diff --cached --quiet; then
            echo "No changes found. Skipping commit."
          else
            git commit -m "Election Update: $(date -u) (UTC)"
            git push
          fi
