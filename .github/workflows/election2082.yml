name: Update Election Data

on:
  schedule:
    # Runs every 5 minutes (the minimum allowed by GitHub)
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push changes back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Run update script
        run: python elecction.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add 2082.json
          # Only commit if the file actually changed to avoid empty commits
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update election data: $(date)" && git push)
